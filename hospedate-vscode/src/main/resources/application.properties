spring.application.name=helloword-vscode
spring.mustache.suffix=.html
spring.servlet.multipart.max-file-size=10MB

# Configuration of my mysql
# Definition of the URL of the database
spring.datasource.url=jdbc:mysql://localhost:3306/hospedate_db?serverTimezone=UTC

# Configuration of the username and password of the database
spring.datasource.username=root
spring.datasource.password=password

# Spring creates automatically the tables in the database based on the entities defined in the project
spring.jpa.hibernate.ddl-auto=update

# It shows the SQL querys in the console
spring.jpa.show-sql=true

{{>header}}

<body id="page-top">
<!--Top Page-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
        <div class="container px-4 px-lg-5">
        <a class="navbar-brand text-dark" href="#page-top">Hospédate</a>
        
        <div class="ms-auto d-flex align-items-center">
            <a class="btn btn-outline-primary btn-sm me-2" href="/admin/hotels">
                <i class="bi bi-buildings"></i> Lista de Hoteles
            </a>
            <a class="btn btn-primary btn-sm me-2" href="/">
                Volver al inicio
            </a>
            <form action="/logout" method="POST" class="m-0">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </form>
        </div>
        </div>
    </nav>
    <!--Title-->
    <section class="page-section mt-5">
        <div class="container px-4 px-lg-5">
            <h2 class="text-center mt-0">Administración de Usuarios</h2>
            <hr class="divider" /> 
            <div class="d-flex justify-content-between align-items-center mb-4">
                <!--Subtitle-->
                <p class="text-muted m-0">Lista de usuarios registrados</p>
            </div>

            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre de usuario</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{#users}}
                            <tr>
                                <td class="text-muted">{{id}}</td>
                                <td><strong>{{name}}</strong></td>
                                <td>{{email}}</td>
                                <td>{{role}}</td>
                                <td class="text-center" style="width: 180px;">
                                    <div class="d-flex flex-column align-items-center">
                                        <a href="/admin/users/edit/{{id}}" class="btn btn-outline-warning btn-sm mb-1 w-100">
                                            <i class="bi bi-pencil-square"></i> Editar
                                        </a>
                                        <form action="/admin/users/delete/{{id}}" method="POST" class="w-100">
                                            <button type="submit" class="btn btn-outline-danger btn-sm w-100"
                                                onclick="return confirm('¿Seguro que quieres eliminar este usuario?')">
                                                <i class="bi bi-trash"></i> Eliminar
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            {{/users}}
                            {{^users}}
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                            </tr>
                            {{/users}}
                        </tbody>
                    </table>
                </div>
            </div> 
        </div>
    </section>

{{>footer}}

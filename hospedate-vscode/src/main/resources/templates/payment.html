{{>header}}

<body id="page-top" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh;">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3 navbar-always-dark" id="solidNav" style="background-color: white !important;">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="/">Hospédate</a>
        </div>
    </nav>

    <div style="height: 120px;"></div>

    <div class="container mb-5">
        <div class="py-4 text-center">
            <i class="bi bi-credit-card text-primary mb-3" style="font-size: 4rem;"></i>
            <h2 class="fw-bold text-dark">Pasarela de Pago Segura</h2>
            <p class="lead text-dark">Estás a un paso de confirmar tu estancia en <b>{{hotelName}}</b>.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-lg p-4 rounded-4" style="background-color: #ffffff;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0 text-secondary">Total a pagar:</h4>
                        <h2 class="mb-0 text-primary fw-bold">{{totalPrice}} €</h2>
                    </div>
                    <hr class="mb-4">

                    <form action="/reserve/process" method="POST">
                        
                        <input type="hidden" name="reserveId" value="{{reserveId}}">

                        <div class="row gy-3">
                            <div class="col-md-12">
                                <label for="cc-name" class="form-label fw-bold">Nombre en la tarjeta</label>
                                <input type="text" class="form-control form-control-lg" id="cc-name" placeholder="Ej: Juan Pérez" required>
                                <small class="text-muted">Como aparece impreso en la tarjeta</small>
                            </div>

                            <div class="col-md-12">
                                <label for="cc-number" class="form-label fw-bold">Número de la tarjeta</label>
                                <input type="text" class="form-control form-control-lg" id="cc-number" placeholder="1234 5678 9101 1121" required>
                            </div>

                            <div class="col-md-6">
                                <label for="cc-expiration" class="form-label fw-bold">Caducidad</label>
                                <input type="text" class="form-control form-control-lg" id="cc-expiration" placeholder="MM/AA" required>
                            </div>

                            <div class="col-md-6">
                                <label for="cc-cvv" class="form-label fw-bold">CVV</label>
                                <input type="text" class="form-control form-control-lg" id="cc-cvv" placeholder="123" required>
                            </div>
                        </div>

                        <hr class="my-4">

                        <button class="w-100 btn btn-primary btn-lg fw-bold rounded-pill" type="submit" style="padding: 15px;">
                            <i class="bi bi-lock-fill me-2"></i> Pagar de forma segura
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

{{>footer}}

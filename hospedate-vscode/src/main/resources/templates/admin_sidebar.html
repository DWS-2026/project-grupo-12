<!-- Admin Sidebar -->
<div class="d-flex" id="admin-wrapper">
    <nav id="admin-sidebar" class="bg-dark text-white" style="min-width:250px; max-width:250px; min-height:100vh; position:fixed; top:0; left:0; z-index:1040; overflow-y:auto;">
        <div class="p-3 border-bottom border-secondary">
            <a class="text-white text-decoration-none fw-bold fs-5" href="/admin/dashboard">
                <i class="bi bi-building me-2"></i>Hospedate Admin
            </a>
        </div>
        <ul class="nav flex-column p-3 gap-1">
            <li class="nav-item">
                <a class="nav-link text-white rounded px-3 py-2 admin-nav-link" href="/admin/dashboard" data-page="dashboard">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white rounded px-3 py-2 admin-nav-link" href="/admin/hotels" data-page="hotels">
                    <i class="bi bi-buildings me-2"></i>Hoteles
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white rounded px-3 py-2 admin-nav-link" href="/admin/users" data-page="users">
                    <i class="bi bi-people me-2"></i>Usuarios
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white rounded px-3 py-2 admin-nav-link" href="/admin/reserves" data-page="reserves">
                    <i class="bi bi-calendar-check me-2"></i>Reservas
                </a>
            </li>
        </ul>
        <div class="mt-auto p-3 border-top border-secondary" style="position:absolute; bottom:0; width:100%;">
            <a class="nav-link text-white-50 px-3 py-2 d-block" href="/">
                <i class="bi bi-house me-2"></i>Volver al inicio
            </a>
            <form action="/logout" method="POST" class="m-0">
                <button type="submit" class="nav-link text-white-50 px-3 py-2 bg-transparent border-0 w-100 text-start">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesion
                </button>
            </form>
        </div>
    </nav>
    <div id="admin-content" style="margin-left:250px; width:calc(100% - 250px); min-height:100vh; background:#f8f9fa;">
        {{#successMessage}}
        <div class="alert alert-success alert-dismissible fade show m-3 mb-0" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{successMessage}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {{/successMessage}}
        {{#errorMessage}}
        <div class="alert alert-danger alert-dismissible fade show m-3 mb-0" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>{{errorMessage}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {{/errorMessage}}

<!-- Pagination controls -->
{{#hasNext}}
<nav class="mt-4 d-flex justify-content-between align-items-center">
    <span class="text-muted small">Pagina {{currentPage}} de {{totalPages}}</span>
    <div>
        {{#hasPrev}}
        <a href="?page={{prevPage}}&search={{search}}" class="btn btn-outline-primary btn-sm me-1">
            <i class="bi bi-chevron-left"></i> Anterior
        </a>
        {{/hasPrev}}
        {{#hasNext}}
        <a href="?page={{nextPage}}&search={{search}}" class="btn btn-outline-primary btn-sm">
            Siguiente <i class="bi bi-chevron-right"></i>
        </a>
        {{/hasNext}}
    </div>
</nav>
{{/hasNext}}
{{^hasNext}}
{{#hasPrev}}
<nav class="mt-4 d-flex justify-content-between align-items-center">
    <span class="text-muted small">Pagina {{currentPage}} de {{totalPages}}</span>
    <div>
        <a href="?page={{prevPage}}&search={{search}}" class="btn btn-outline-primary btn-sm me-1">
            <i class="bi bi-chevron-left"></i> Anterior
        </a>
    </div>
</nav>
{{/hasPrev}}
{{/hasNext}}

{{>header}}

<body id="page-top">
    <!--Title-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3 navbar-shrink" id="mainNav">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand fw-bold" href="admin_hotel.html">Hospédate</a>
        </div>
    </nav>

    <section class="page-section mt-5">
        <div class="container px-4 px-lg-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!--Title of the form-->
                    <h2 class="text-center mt-0">Editar Información del Hotel</h2>
                    <hr class="divider" /> 
                    <!--Creation of the form-->
                    <form action="update_hotel.php" method="POST" class="mt-4">
                        
                        <input type="hidden" name="hotel_id" value="1">

                        <div class="mb-4">
                            <label for="hotelName" class="form-label fw-bold">Nombre del hotel</label>
                            <input type="text" class="form-control form-control-lg" id="hotelName" name="hotelName" value="Hotel Sol y Luna" required>
                        </div>

                        <div class="mb-4">
                            <label for="location" class="form-label fw-bold">Ubicación</label>
                            <input type="text" class="form-control form-control-lg" id="location" name="location" value="Málaga, Spain" required>
                        </div>

                        <div class="mb-4">
                            <label for="price" class="form-label fw-bold">Precio por noche (€)</label>
                            <input type="number" class="form-control form-control-lg" id="price" name="price" step="0.01" value="85.00">
                        </div>

                        <div class="mb-5">
                            <label for="description" class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" id="description" name="description" rows="4">Disfruta de las mejores vistas del Mar Mediterráneo.</textarea>
                        </div>

                        <div class="d-flex justify-content-center gap-3">
                            <!--Button to submit the changes-->
                            <button type="submit" class="btn btn-primary btn-xl shadow">
                                Actualizar cambios
                            </button>
                            <!--Button to cancel the form and go backwards-->
                            <a href="admin_hotel.html" class="btn btn-light btn-xl border">
                                Cancelar
                            </a>
                        </div>

                    </form>
                    </div>
            </div>
        </div>
    </section>

{{>footer}}

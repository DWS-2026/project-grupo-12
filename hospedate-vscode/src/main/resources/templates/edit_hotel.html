{{>header}}

<body id="page-top">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand text-dark" href="#page-top">Hospédate</a>
            <div class="ms-auto d-flex align-items-center">
                <a class="btn btn-outline-primary btn-sm me-2" href="/admin/users">
                    <i class="bi bi-people"></i> Lista de Usuarios
                </a>
                <a class="btn btn-primary btn-sm me-2" href="/">
                    Volver al inicio
                </a>
                <form action="/logout" method="POST" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <section class="page-section mt-5">
        <div class="container px-4 px-lg-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!--Title of the form-->
                    <h2 class="text-center mt-0">Editar Información del Hotel</h2>
                    <hr class="divider" />
                    <!--Creation of the form-->
                    {{#hotel}}
                    <form action="/admin/hotels/save" method="POST" class="mt-4">

                        <input type="hidden" name="id" value="{{id}}">

                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold">Nombre del hotel</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name"
                                value="{{name}}" required>
                        </div>

                        <div class="mb-4">
                            <label for="tipo" class="form-label fw-bold">Tipo de Hotel</label>
                            <input type="text" class="form-control form-control-lg" id="tipo" name="tipo"
                                value="{{tipo}}" required>
                        </div>

                        <div class="mb-4">
                            <label for="city" class="form-label fw-bold">Ciudad</label>
                            <input type="text" class="form-control form-control-lg" id="city" name="city"
                                value="{{city}}" required>
                        </div>

                        <div class="mb-4">
                            <label for="location" class="form-label fw-bold">Ubicación</label>
                            <input type="text" class="form-control form-control-lg" id="location" name="location"
                                value="{{location}}" required>
                        </div>

                        <div class="mb-4">
                            <label for="price" class="form-label fw-bold">Precio por noche (€)</label>
                            <input type="number" class="form-control form-control-lg" id="price" name="price"
                                step="0.01" value="{{price}}" required>
                        </div>

                        <div class="mb-4">
                            <label for="rating" class="form-label fw-bold">Rating (0-5)</label>
                            <input type="number" class="form-control form-control-lg" id="rating" name="rating"
                                step="0.1" min="0" max="5" value="{{rating}}" required>
                        </div>

                        <div class="mb-5">
                            <label for="description" class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                required>{{description}}</textarea>
                        </div>

                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-primary btn-xl shadow">
                                Actualizar cambios
                            </button>
                            <a href="/admin/hotels" class="btn btn-light btn-xl border">
                                Cancelar
                            </a>
                        </div>
                    </form>
                    {{/hotel}}
                </div>
            </div>
        </div>
    </section>

    {{>footer}}

components:
  schemas:
    HotelDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
          minLength: 0
        tipo:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        price:
          type: number
          format: double
          minimum: 0
        description:
          type: string
          maxLength: 2000
          minLength: 0
        rating:
          type: number
          format: double
          maximum: 5
          minimum: 0
        wifi:
          type: boolean
        tv:
          type: boolean
        airConditioning:
          type: boolean
        family:
          type: boolean
        services:
          type: array
          items:
            type: string
          uniqueItems: true
        mainImageUrl:
          type: string
      required:
      - city
      - description
      - location
      - name
      - tipo
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
          minLength: 0
        email:
          type: string
          format: email
          minLength: 1
        role:
          type: string
      required:
      - email
      - name
    ReserveDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        entryDate:
          type: string
          format: date
        departureDate:
          type: string
          format: date
        guests:
          type: integer
          format: int32
          minimum: 1
        nights:
          type: integer
          format: int64
        price:
          type: number
          format: double
        status:
          type: string
        hotelId:
          type: integer
          format: int64
        hotelName:
          type: string
        customerId:
          type: integer
          format: int64
        customerName:
          type: string
      required:
      - departureDate
      - entryDate
      - hotelId
    ReviewDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 100
          minLength: 0
        comment:
          type: string
          maxLength: 2000
          minLength: 0
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
        publishDate:
          type: string
          format: date
        authorName:
          type: string
        hotelId:
          type: integer
          format: int64
      required:
      - comment
      - hotelId
      - title
    UserRegisterDTO:
      type: object
      properties:
        username:
          type: string
          maxLength: 50
          minLength: 3
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 100
          minLength: 6
      required:
      - email
      - password
      - username
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
        error:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - password
      - username
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageReserveDTO:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ReserveDTO"
        number:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        pageable:
          $ref: "#/components/schemas/PageableObject"
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    PageHotelDTO:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/HotelDTO"
        number:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        pageable:
          $ref: "#/components/schemas/PageableObject"
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    PageUserDTO:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/UserDTO"
        number:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        pageable:
          $ref: "#/components/schemas/PageableObject"
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
